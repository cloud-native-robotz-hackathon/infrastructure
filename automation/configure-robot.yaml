---
- hosts: robots
  gather_facts: true
  vars:
    edge_controller_version: v2.1.1
    robot_config_service_version: master
  handlers:
    - name: restart edge-controller
      ansible.builtin.systemd:
        name: edge-controller.service
        state: restarted
        daemon_reload: true
  tasks:
    - name: Slurp /robot-image-version
      ansible.builtin.slurp:
        src: /robot-image-version
      register: robot_image_version

    - name: Check robot image version
      fail:
        msg: "Please check robot image version"
      # image version robot-hackathon-image.20240726
      #when: robot_image_version['content'] != "cm9ib3QtaGFja2F0aG9uLWltYWdlLjIwMjQwNzI2Cg=="
      # image version robot-hackathon-image.20260212
      when: robot_image_version['content'] != "cm9ib3QtaGFja2F0aG9uLWltYWdlLjIwMjYwMjEyCg=="

    - name: Check version
      ansible.builtin.uri:
        url: "http://{{ansible_host}}:5000/version"
        method: GET
        return_content: true
        status_code:
          - 200
      register: version_check
      until: version_check is not failed and edge_controller_version in version_check.content
      retries: 10
      delay: 2

    - name: Rollout /etc/issue
      ansible.builtin.copy:
        content: |
          Ubuntu 22.04.4 LTS \n \l
          eth0: \4{eth0}
          wlan0: \4{wlan0}
        dest: /etc/issue

    # ToDo: Check if this is needed anymore
    #   https://github.com/cloud-native-robotz-hackathon/infrastructure/issues/230
    - name: Rollout /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        search_string: "{{ ansible_default_ipv4.address }}"
        line: "{{ ansible_default_ipv4.address }} robot.local {{ inventory_hostname }}"
        owner: root
        group: root
        mode: '0644'

    # Not needed anymore, hostname is set manually
    # - name: Set hostname
    #   ansible.builtin.hostname:
    #     name: "{{ inventory_hostname }}"

    - name: "Setup edge-controller {{ edge_controller_version }}"
      ansible.builtin.include_role:
        name: robot
        tasks_from: setup-edge-controller.yaml
      vars:
        edge_controller_version: "{{ edge_controller_version }}"

    - name: Setup robot-config-service
      ansible.builtin.include_role:
        name: robot
        tasks_from: setup-robot-config-service.yaml
      vars:
        robot_config_service_version: "{{ robot_config_service_version }}"

    - name: reboot
      ansible.builtin.reboot:
        msg: "rebooting..."

    - name: Reset MicroShift
      ansible.builtin.include_role:
        name: robot
        tasks_from: reset-microshift.yaml

    - name: Wait for api
      ansible.builtin.wait_for:
        port: 6443

