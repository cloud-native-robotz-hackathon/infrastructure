# Role for hubcontroller in the openshift-gitops namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hubcontroller-role
  namespace: openshift-gitops
rules:
# Secret management (for Skupper connection tokens)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch", "watch"]
